name: medismart
description: "MediSmart - Medication Reminder & Management System"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.2
  firebase_messaging: ^15.1.6

  # State Management
  provider: ^6.1.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0

  # Notifications (mobile)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  permission_handler: ^11.3.1

  # Charts
  fl_chart: ^0.69.2

  # PDF Export
  pdf: ^3.11.1
  path_provider: ^2.1.4
  share_plus: ^10.0.0

  # CSV Export
  csv: ^6.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
